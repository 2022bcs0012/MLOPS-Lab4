name: Train and Deploy Model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python train.py

      - name: Read accuracy
        id: metrics
        run: |
          ACC=$(python -c "import json;print(json.load(open('output/metrics.json'))['Accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Model accuracy: $ACC"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            output/model.pkl
            output/metrics.json

      - name: Compare accuracy with baseline
        id: compare
        run: |
          CURR=${{ steps.metrics.outputs.accuracy }}
          BEST=${{ vars.BEST_ACCURACY }}

          echo "Current accuracy = $CURR"
          echo "Best accuracy: $BEST"

          if (( $(echo "$CURR <= $BEST" | bc -l) )); then
            echo "Metric did not improve"
            echo "improved=false" >> $GITHUB_OUTPUT
          else
            echo "Metric improved"
            echo "improved=true" >> $GITHUB_OUTPUT
          fi

      - name: Login to DockerHub
        if: steps.compare.outputs.improved == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.LAB4_DOCKER_ACCESS_TOKEN }}

      - name: Build Docker image
        if: steps.compare.outputs.improved == 'true'
        run: |
          docker build -f DockerFile -t ${{ secrets.DOCKER_USERNAME }}/ml-model:latest .

      - name: Push Docker image
        if: steps.compare.outputs.improved == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest

      - name: Update BEST_ACCURACY variable
        if: steps.compare.outputs.improved == 'true'
        env:
          GH_TOKEN: ${{ secrets.LAB4_GITHUB_ACCESS_TOKEN }}
        run: |
          gh variable set BEST_ACCURACY --body "${{ steps.metrics.outputs.accuracy }}"
